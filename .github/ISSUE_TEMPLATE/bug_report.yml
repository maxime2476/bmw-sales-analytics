name: "🐛 Bug report"
description: Report a problem with the analytics, pipeline or dashboard.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make ...`
        2. Open the ... tab
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python version, local / Docker / HF Space"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
    validations:
      required: false
