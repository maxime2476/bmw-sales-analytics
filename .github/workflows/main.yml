name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      BMW_OFFLINE_MODE: "true"      # no network in CI; deterministic mocks
      KMP_DUPLICATE_LIB_OK: "TRUE"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 isort pytest pytest-cov

      - name: Format check (black)
        run: black --check src app tests

      - name: Import-order check (isort)
        run: isort --check-only src app tests

      - name: Lint (flake8)
        run: flake8 src app tests

      - name: Test (pytest + coverage)
        run: pytest --cov=bmw_sales --cov-report=term-missing

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: bmw-sales-analytics:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
