name: "✨ Feature request"
description: Suggest an analysis, model, data source or UI improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap or need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: principles
    attributes:
      label: Honesty check
      options:
        - label: This proposal reports honest results and never leaks the target.
          required: true
