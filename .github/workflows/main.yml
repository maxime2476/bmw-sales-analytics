name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type, Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      BMW_OFFLINE_MODE: "true"      # no network in CI; deterministic mocks
      KMP_DUPLICATE_LIB_OK: "TRUE"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 isort mypy types-requests pytest pytest-cov pip-audit

      - name: Format check (black)
        run: black --check src app tests

      - name: Import-order check (isort)
        run: isort --check-only src app tests

      - name: Lint (flake8)
        run: flake8 src app tests

      - name: Type check (mypy)
        run: mypy src

      - name: Test (pytest + coverage gate)
        run: pytest --cov=bmw_sales --cov-report=xml --cov-report=term-missing --cov-fail-under=62

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --strict || true   # report, do not block

  docker:
    name: Build, scan & publish image
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: bmw-sales-analytics:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bmw-sales-analytics:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "0"        # report findings without failing the build

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push to GHCR
        if: github.event_name == 'push'
        run: |
          docker tag bmw-sales-analytics:ci "$IMAGE:latest"
          docker tag bmw-sales-analytics:ci "$IMAGE:${GITHUB_SHA::7}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::7}"
          echo "Pushed $IMAGE:latest and $IMAGE:${GITHUB_SHA::7}"
